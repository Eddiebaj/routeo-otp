name: Weekly GTFS Refresh
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  refresh-gtfs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Download latest OC Transpo GTFS
        run: |
          curl -fL "https://oct-gtfs-emasagcnfmcgeham.z01.azurefd.net/public-access/GTFSExport.zip" \
            -o google_transit.zip
          echo "OC GTFS: $(du -sh google_transit.zip)"
          unzip -t google_transit.zip && echo "OC GTFS ZIP valid"

      - name: Download latest STO GTFS
        run: |
          curl -fL "https://contenu.sto.ca/GTFS/GTFS.zip" -o sto-gtfs.zip
          echo "STO GTFS: $(du -sh sto-gtfs.zip)"
          unzip -t sto-gtfs.zip && echo "STO GTFS ZIP valid"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add google_transit.zip sto-gtfs.zip
          if git diff --staged --quiet; then
            echo "No GTFS changes — forcing redeploy anyway."
            git commit --allow-empty -m "chore: force OTP rebuild $(date +'%Y-%m-%d')"
          else
            git commit -m "chore: refresh GTFS $(date +'%Y-%m-%d')"
          fi
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/Eddiebaj/routeo-otp.git
          git push

      - name: Trigger Railway redeploy
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceInstanceRedeploy(environmentId: \\\"${{ secrets.RAILWAY_ENVIRONMENT_ID }}\\\", serviceId: \\\"${{ secrets.RAILWAY_SERVICE_ID }}\\\") }\"}" \
            https://backboard.railway.app/graphql/v2 | tee /dev/stderr | jq .

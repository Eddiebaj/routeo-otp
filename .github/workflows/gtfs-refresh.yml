name: Nightly GTFS Refresh
on:
  schedule:
    - cron: '0 7 1 * *'
  workflow_dispatch:

jobs:
  refresh-gtfs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Download latest GTFS
        run: |
          curl -L "https://oct-gtfs-emasagcnfmcgeham.z01.azurefd.net/public-access/GTFSExport.zip" \
            -o google_transit.zip
          echo "Downloaded $(du -sh google_transit.zip)"
          unzip -t google_transit.zip && echo "✓ ZIP is valid"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add google_transit.zip
          if git diff --staged --quiet; then
            echo "No changes to GTFS, skipping."
          else
            git commit -m "chore: refresh OC Transpo GTFS $(date +'%Y-%m-%d')"
            git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/Eddiebaj/routeo-otp.git
            git push
          fi

      - name: Trigger Railway redeploy
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RAILWAY_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation { deploymentRedeploy(id: \"${{ secrets.RAILWAY_SERVICE_ID }}\") { id } }"}' \
            https://backboard.railway.app/graphql/v2

